<!doctype html>
<html lang="en">
  <head>
    <!-- 🧠 HOW IT WORKS: These meta tags help the browser understand text characters 
         and ensure your game scales properly on mobile screens! -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- 📝 TODO: Give your game a fun title! This shows up in the browser tab. -->
    <title>MY AWESOME CLICKER GAME</title>

    <!-- 📝 TODO: When you get to CSS, link your stylesheet here. -->
    <!-- Example: <link rel="stylesheet" href="style.css"> -->

    <!-- 📝 TODO: When you get to JS, link your script here. -->
    <!-- Example: <script src="script.js" defer></script> -->
  </head>

  <body>
    <!-- =========================================
         🎮 LEFT COLUMN: THE GAME ZONE 🎮
         ========================================= -->
    <!-- 🧠 HOW IT WORKS: The 'class' acts like a nametag for your CSS. 
         Our CSS looks for "game-zone" to know where to apply your styles! -->
    <div class="game-zone">
      <!-- 📝 TODO: Change this heading to whatever fits your game's theme! -->
      <h2>START CLICKING!</h2>

      <!-- 🧠 HOW IT WORKS: The 'id' acts like a nametag for JavaScript. 
           JS will look specifically for id="score" so it knows where to update the math! -->
      <!-- ⚠️ IMPORTANT: Do NOT change the IDs in this file, or your JS will lose track of them! -->
      <h1 id="score">0</h1>

      <!-- 📝 TODO: What are you collecting? (Points, Cookies, Gold, Energy?) -->
      <p>Points Generated</p>

      <!-- Stats -->
      <p>Points per second: <span id="pps">0</span></p>

      <!-- 📝 TODO: What does your main button say? -->
      <button id="click-btn">CLICK ME</button>
    </div>

    <!-- =========================================
         🛒 RIGHT COLUMN: THE SHOP ZONE 🛒
         ========================================= -->
    <div class="shop-zone">
      <!-- 📝 TODO: Name your shop! -->
      <h2>THE SHOP</h2>

      <!-- 🧠 HOW IT WORKS: We use <span> tags inside the button to separate pieces of text. 
           This lets our CSS Flexbox push the name to the left and the cost to the right! -->

      <!-- SHOP ITEM 1 -->
      <button class="buy-btn" id="btn-auto1">
        <span class="count" id="count-auto1"></span>
        <!-- 📝 TODO: Name your first auto clicker! (e.g., Grandma, Helper, Robot) -->
        <span>Auto Clicker 1 (+1/sec)</span>
        <span class="cost-text" id="cost-auto1"></span>
      </button>

      <!-- SHOP ITEM 2 -->
      <button class="buy-btn" id="btn-auto2">
        <span class="count" id="count-auto2"></span>
        <!-- 📝 TODO: Name your second auto clicker! -->
        <span>Auto Clicker 2 (+5/sec)</span>
        <span class="cost-text" id="cost-auto2"></span>
      </button>

      <!-- SHOP ITEM 3 -->
      <button class="buy-btn" id="btn-auto3">
        <span class="count" id="count-auto3"></span>
        <!-- 📝 TODO: Name your third auto clicker! -->
        <span>Auto Clicker 3 (+10/sec)</span>
        <span class="cost-text" id="cost-auto3"></span>
      </button>
    </div>
    <!-- End of Shop Zone -->
  </body>
</html>
